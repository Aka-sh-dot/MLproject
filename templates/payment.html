<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Payment Fraud Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(120deg, #1f4037, #99f2c8);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: #ffffff;
            padding: 30px 40px;
            width: 430px;
            border-radius: 10px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #1f4037;
            margin-bottom: 25px;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            margin-top: 12px;
            display: block;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #1f4037;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #1f4037;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background-color: #145a4a;
        }

        /* Prediction Result Box */
        .result-box {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }

        .result-box.fraud {
            background-color: #ffe6e6;
            border-left: 5px solid #cc0000;
            color: #cc0000;
        }

        .result-box.safe {
            background-color: #e6fffa;
            border-left: 5px solid #1f4037;
            color: #1f4037;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Online Payment Fraud Detection</h2>

        <form action="/predict_Transaction" method="POST">

            <label for="step">Step (Transaction Time Step)</label>
            <input type="number" name="step" required>

            <label for="amount">Transaction Amount</label>
            <input type="number" step="0.01" name="amount" required>

            <label for="oldbalanceOrg">Old Balance (Sender)</label>
            <input type="number" step="0.01" name="oldbalanceOrg" required>

            <label for="newbalanceOrig">New Balance (Sender)</label>
            <input type="number" step="0.01" name="newbalanceOrig" required>

            <label for="oldbalanceDest">Old Balance (Receiver)</label>
            <input type="number" step="0.01" name="oldbalanceDest" required>

            <label for="newbalanceDest">New Balance (Receiver)</label>
            <input type="number" step="0.01" name="newbalanceDest" required>

            <label for="type">Transaction Type</label>
            <select name="type" required>
                <option value="">-- Select Transaction Type --</option>
                <option value="CASH_OUT">CASH_OUT</option>
                <option value="TRANSFER">TRANSFER</option>
                <option value="DEBIT">DEBIT</option>
                <option value="PAYMENT">PAYMENT</option>
                <option value="CASH_IN">CASH_IN</option>
            </select>

            <button type="submit">Check Fraud</button>
        </form>

        <!-- 🔹 Display Prediction -->
        {% if type_of_transaction %}
        <div class="result-box 
            {% if 'Fraud' in type_of_transaction or 'fraud' in type_of_transaction %}
                fraud
            {% else %}
                safe
            {% endif %}
        ">
            <h3>Transaction Analysis Result</h3>
            <p>{{ type_of_transaction }}</p>
        </div>
        {% endif %}

        <div class="footer">
            © 2025 Online Fraud Detection System
        </div>
    </div>

</body>
</html>
